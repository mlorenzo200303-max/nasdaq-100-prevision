<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nasdaq 100 — Segnale IA Giornaliero</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 820px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 1.6rem; font-weight: 600; color: #fff; letter-spacing: -0.02em; }
    header p { font-size: 0.85rem; color: #666; margin-top: 6px; }
    .signal-card { background: #1a1d27; border-radius: 20px; padding: 2.5rem 2rem; text-align: center; margin-bottom: 1.5rem; border: 1px solid #2a2d3a; position: relative; overflow: hidden; }
    .signal-card::before { content: ''; position: absolute; inset: 0; opacity: 0.04; border-radius: 20px; }
    .signal-card.long::before { background: radial-gradient(circle at 50% 0%, #22c55e, transparent 70%); }
    .signal-card.flat::before  { background: radial-gradient(circle at 50% 0%, #ef4444, transparent 70%); }
    .signal-emoji { font-size: 4rem; margin-bottom: 0.5rem; }
    .signal-label { font-size: 2.8rem; font-weight: 700; letter-spacing: -0.03em; }
    .long .signal-label { color: #22c55e; }
    .flat .signal-label { color: #ef4444; }
    .signal-sub { font-size: 0.9rem; color: #888; margin-top: 8px; }
    .prob-section { margin-top: 1.8rem; }
    .prob-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: #888; margin-bottom: 8px; }
    .prob-value { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .prob-bar { height: 8px; background: #2a2d3a; border-radius: 99px; overflow: hidden; }
    .prob-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #3b82f6, #22c55e); transition: width 1s ease; }
    .threshold-marker { position: relative; height: 16px; margin-top: 4px; }
    .threshold-line { position: absolute; top: 0; width: 1px; height: 100%; background: #666; }
    .threshold-text { position: absolute; top: 0; font-size: 0.7rem; color: #666; transform: translateX(-50%); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    .metric { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 14px; padding: 1.1rem 1rem; text-align: center; }
    .metric-name { font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .metric-value { font-size: 1.4rem; font-weight: 600; color: #fff; }
    .metric-hint { font-size: 0.7rem; color: #555; margin-top: 4px; }
    .chart-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .chart-card h3 { font-size: 0.85rem; color: #888; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .chart-wrap { height: 160px; }
    footer { text-align: center; font-size: 0.75rem; color: #444; margin-top: 2rem; line-height: 1.6; }
    footer a { color: #555; }
    .loader { text-align: center; padding: 4rem; color: #555; font-size: 0.9rem; }
    .update-badge { display: inline-block; background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 99px; padding: 4px 14px; font-size: 0.75rem; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>📈 Nasdaq 100 — Segnale IA</h1>
    <p>Modello XGBoost aggiornato ogni sera dopo la chiusura dei mercati USA</p>
  </header>
  <div id="app"><div class="loader">⏳ Caricamento segnale...</div></div>
  <footer>
    ⚠️ Questo sito è a scopo educativo e sperimentale.<br>
    Non costituisce consulenza finanziaria. Investi sempre con consapevolezza.<br><br>
    <a href="https://github.com" target="_blank">Codice su GitHub</a>
  </footer>
</div>
<script>
async function loadSignal() {
  const app = document.getElementById('app');
  try {
const res = await fetch('./signal.json?t=' + Date.now());
    const data = await res.json();
    render(data);
  } catch(e) {
    app.innerHTML = '<div class="loader" style="color:#ef4444">❌ Impossibile caricare il segnale.</div>';
  }
}
function render(d) {
  const isLong = d.segnale === 'LONG';
  const cls    = isLong ? 'long' : 'flat';
  const rsi = d.indicatori.RSI_14;
  const rsiColor = rsi > 70 ? '#ef4444' : rsi < 30 ? '#22c55e' : '#f59e0b';
  const vix = d.indicatori.VIX;
  const vixColor = vix > 25 ? '#ef4444' : vix < 15 ? '#22c55e' : '#f59e0b';
  document.getElementById('app').innerHTML = `
    <div class="signal-card ${cls}">
      <div class="signal-emoji">${d.emoji}</div>
      <div class="signal-label">${d.segnale}</div>
      <div class="signal-sub">Analisi del ${d.data_analisi} &nbsp;·&nbsp; Ultimo close: $${d.ultimo_close.toLocaleString('it-IT')}</div>
      <div class="prob-section">
        <div class="prob-label"><span>Probabilità rialzo</span><span class="prob-value">${d.probabilita}%</span></div>
        <div class="prob-bar"><div class="prob-fill" id="probFill" style="width:0%"></div></div>
        <div class="threshold-marker">
          <div class="threshold-line" style="left:${d.soglia}%"></div>
          <div class="threshold-text" style="left:${d.soglia}%">soglia ${d.soglia}%</div>
        </div>
      </div>
      <div class="update-badge">🔄 Aggiornato: ${d.aggiornato}</div>
    </div>
    <div class="grid">
      <div class="metric"><div class="metric-name">RSI 14</div><div class="metric-value" style="color:${rsiColor}">${d.indicatori.RSI_14}</div><div class="metric-hint">${rsi > 70 ? 'Ipercomprato' : rsi < 30 ? 'Ipervenduto' : 'Neutro'}</div></div>
      <div class="metric"><div class="metric-name">MACD</div><div class="metric-value" style="color:${d.indicatori.MACD >= 0 ? '#22c55e' : '#ef4444'}">${d.indicatori.MACD}</div><div class="metric-hint">${d.indicatori.MACD >= 0 ? 'Positivo' : 'Negativo'}</div></div>
      <div class="metric"><div class="metric-name">VIX</div><div class="metric-value" style="color:${vixColor}">${d.indicatori.VIX}</div><div class="metric-hint">${vix > 25 ? 'Alta paura' : vix < 15 ? 'Bassa paura' : 'Normale'}</div></div>
      <div class="metric"><div class="metric-name">BB Position</div><div class="metric-value">${d.indicatori.BB_pos}%</div><div class="metric-hint">${d.indicatori.BB_pos > 80 ? 'Banda alta' : d.indicatori.BB_pos < 20 ? 'Banda bassa' : 'Centrale'}</div></div>
    </div>
    <div class="chart-card">
      <h3>📊 Ultime sessioni</h3>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
    </div>`;
  setTimeout(() => { document.getElementById('probFill').style.width = d.probabilita + '%'; }, 100);
  const labels = d.storico.map(s => s.data);
  const values = d.storico.map(s => s.close);
  const trend  = values[values.length-1] >= values[0] ? '#22c55e' : '#ef4444';
  new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: { labels, datasets: [{ data: values, borderColor: trend, borderWidth: 2, pointRadius: 4, pointBackgroundColor: trend, fill: true, backgroundColor: trend + '18', tension: 0.3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { color: '#2a2d3a' }, ticks: { color: '#666', font: { size: 11 } } },
        y: { grid: { color: '#2a2d3a' }, ticks: { color: '#666', font: { size: 11 }, callback: v => '$' + v.toLocaleString('it-IT') } } } }
  });
}
loadSignal();
</script>
</body>
</html>
